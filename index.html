<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calendar</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Calendar -->
    <div class="calendar" style="-webkit-app-region: drag">
      <!-- Title -->
      <div class="title-pill">
        <h1 id="title">Sher's Calendar</h1>
      </div>
      <!-- Date -->
      <div class="date-panel">
        <p id="day">Day</p>
        <p id="month">Month</p>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
